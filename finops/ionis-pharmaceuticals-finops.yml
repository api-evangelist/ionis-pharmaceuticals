specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Ionis Pharmaceuticals
providerId: ionis-pharmaceuticals
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Pharmaceuticals
  - Biotech
description: 'FOCUS-aligned FinOps placeholder for Ionis Pharmaceuticals: an RNA-focused biotech with
  no public API or rate card. FinOps applies primarily to internal cloud and validated-system spend
  rather than a public API surface.'
notes: Ionis does not publish an API rate card. Meters below model the typical partner / clinical-system
  integration surface; cannot be reconciled without a customer contract.
sources:
  - https://www.ionispharma.com
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Ionis Pharmaceuticals, Inc.
serviceCategory: Biotech / Pharmaceuticals
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
focusColumns:
  ServiceName: Ionis Pharmaceuticals
  ServiceCategory: Biotech / Pharmaceuticals
  ProviderName: Ionis Pharmaceuticals
  PublisherName: Ionis Pharmaceuticals, Inc.
  InvoiceIssuerName: Ionis Pharmaceuticals, Inc.
  BillingCurrency: USD
meters:
  - name: integration_subscription
    unit: month
    aggregation: sum
    dimensions:
      - partner
      - integration_type
  - name: clinical_data_volume
    unit: GB
    aggregation: sum
    dimensions:
      - study
principles:
  - name: Visibility
    description: Track partner integration invoices and validated-system cloud spend against study
      and program codes; no public Ionis usage API.
  - name: Allocation
    description: Allocate integration cost to the clinical program / study driving the data exchange.
  - name: Optimization
    description: Consolidate partner platforms and reuse validated environments across studies where
      compliance allows.
  - name: Accountability
    description: Clinical operations + IT jointly own integration spend; quarterly review against study
      budgets.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
